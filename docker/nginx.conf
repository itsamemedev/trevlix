# ============================================================
#  TREVLIX v1.0.0 – Nginx Reverse Proxy
#  Used with: docker compose --profile production up
#  Place SSL certificates in ./docker/ssl/
#    - ./docker/ssl/trevlix.crt
#    - ./docker/ssl/trevlix.key
# ============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS + WebSocket proxy
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/trevlix.crt;
    ssl_certificate_key /etc/nginx/ssl/trevlix.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options       SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection      "1; mode=block";

    # Increase buffer for large API responses
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    # ── HTTP requests ─────────────────────────────────────────
    location / {
        proxy_pass         http://trevlix:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── WebSocket (Socket.IO) ─────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://trevlix:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
    }
}
