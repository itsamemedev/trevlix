# ╔══════════════════════════════════════════════════════════════╗
# ║  TREVLIX – CI/CD Pipeline                                    ║
# ║  Lint → Test → Coverage → Docker Build                       ║
# ╚══════════════════════════════════════════════════════════════╝

name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

# Gemeinsame Umgebungsvariablen für Test-Jobs
env:
  PAPER_TRADING: "true"
  ADMIN_PASSWORD: "test-admin-password-12345"
  JWT_SECRET: "test-jwt-secret-32-bytes-hex-0123456789abcdef0123456789abcdef"
  SECRET_KEY: "test-flask-secret-key-0123456789abcdef0123456789abcdef0123456789"
  ENCRYPTION_KEY: "dGVzdC1rZXktZm9yLXVuaXQtdGVzdHMtMTIzNDU2Nzg="
  LANGUAGE: "de"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v --tb=short

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run coverage
        run: pytest tests/ --cov=. --cov-report=term-missing --tb=short

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t trevlix:test .
      - name: Verify image
        run: docker images trevlix:test
