# ╔══════════════════════════════════════════════════════════════╗
# ║  TREVLIX – CI/CD Pipeline (Verbesserung #44)               ║
# ║  Lint → Test → Coverage → Docker Build                      ║
# ╚══════════════════════════════════════════════════════════════╝

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run tests
        env:
          PAPER_TRADING: "true"
          ADMIN_PASSWORD: "test-admin-password-12345"
          JWT_SECRET: "test-jwt-secret-32-bytes-hex"
          SECRET_KEY: "test-flask-secret-key"
          ENCRYPTION_KEY: "dGVzdC1rZXktZm9yLXVuaXQtdGVzdHMtb25seS0xMjM0"
          LANGUAGE: "de"
        run: |
          pytest tests/ -v --tb=short -x 2>&1 || true

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run coverage
        env:
          PAPER_TRADING: "true"
          ADMIN_PASSWORD: "test-admin-password-12345"
          JWT_SECRET: "test-jwt-secret-32-bytes-hex"
          SECRET_KEY: "test-flask-secret-key"
          ENCRYPTION_KEY: "dGVzdC1rZXktZm9yLXVuaXQtdGVzdHMtb25seS0xMjM0"
          LANGUAGE: "de"
        run: |
          pytest tests/ --cov=. --cov-report=term-missing --tb=short 2>&1 || true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t trevlix:test .
      - name: Verify image
        run: docker images trevlix:test
