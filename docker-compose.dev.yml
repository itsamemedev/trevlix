# ╔══════════════════════════════════════════════════════════════╗
# ║  TREVLIX – Docker Compose Development (Verbesserung #47)   ║
# ║  Start: docker compose -f docker-compose.dev.yml up        ║
# ╚══════════════════════════════════════════════════════════════╝
#
# Features:
#  - Hot-Reload (Volume-Mount des Quellcodes)
#  - Debug-Modus mit erweiterten Logs
#  - Offener MySQL-Port für lokale Tools

version: "3.9"

services:

  trevlix-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trevlix_dev
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - EXCHANGE=${EXCHANGE:-cryptocom}
      - API_KEY=${API_KEY:-}
      - API_SECRET=${API_SECRET:-}
      - MYSQL_HOST=mysql-dev
      - MYSQL_PORT=3306
      - MYSQL_USER=trevlix
      - MYSQL_PASS=${MYSQL_PASS:-devpassword}
      - MYSQL_DB=trevlix
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-devadminpass}
      - DASHBOARD_SECRET=${DASHBOARD_SECRET:-devsecret}
      - JWT_SECRET=${JWT_SECRET:-devjwtsecret}
      - SECRET_KEY=${SECRET_KEY:-devflasksecret}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-devencryptionkey1234567890abcdef}
      - ALLOWED_ORIGINS=*
      - PAPER_TRADING=true
      - LOG_LEVEL=DEBUG
      - JSON_LOGS=false
      - LANGUAGE=${LANGUAGE:-de}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-dev-webhook-secret-change-me}
      - AUTO_RESTART=false
      - GITHUB_BRANCH=${GITHUB_BRANCH:-main}
    volumes:
      # Hot-Reload: Quellcode-Mount
      - ./server.py:/app/server.py:ro
      - ./ai_engine.py:/app/ai_engine.py:ro
      - ./trevlix_i18n.py:/app/trevlix_i18n.py:ro
      - ./services/:/app/services/:ro
      - ./routes/:/app/routes/:ro
      - ./templates/:/app/templates/:ro
      - ./static/:/app/static/:ro
      - ./backups:/app/backups
      - ./logs:/app/logs
    depends_on:
      mysql-dev:
        condition: service_healthy
    networks:
      - trevlix_dev_net

  mysql-dev:
    image: mysql:8.0
    container_name: trevlix_mysql_dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASS:-devrootpass}
      MYSQL_DATABASE: trevlix
      MYSQL_USER: trevlix
      MYSQL_PASSWORD: ${MYSQL_PASS:-devpassword}
    volumes:
      - mysql_dev_data:/var/lib/mysql
    networks:
      - trevlix_dev_net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u trevlix -p$$MYSQL_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    ports:
      - "3307:3306"   # Port 3307 um Konflikte mit lokaler MySQL zu vermeiden

volumes:
  mysql_dev_data:
    driver: local

networks:
  trevlix_dev_net:
    driver: bridge
