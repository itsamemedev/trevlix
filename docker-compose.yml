version: "3.9"

# ╔══════════════════════════════════════════════════════════════╗
# ║  TREVLIX v1.0.0 – Docker Compose                            ║
# ║  Start: docker compose up -d                                 ║
# ║  Logs:  docker compose logs -f trevlix                       ║
# ╚══════════════════════════════════════════════════════════════╝

services:

  # ── TREVLIX Bot ────────────────────────────────────────────────
  trevlix:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trevlix
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      # Exchange
      - EXCHANGE=${EXCHANGE:-cryptocom}
      - API_KEY=${API_KEY}
      - API_SECRET=${API_SECRET}
      # MySQL (uses service name as host)
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=trevlix
      - MYSQL_PASS=${MYSQL_PASS:-trevlix_pass}
      - MYSQL_DB=trevlix
      # Security
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - DASHBOARD_SECRET=${DASHBOARD_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5000}
      # Features
      - PAPER_TRADING=${PAPER_TRADING:-true}
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK:-}
      - CRYPTOPANIC_TOKEN=${CRYPTOPANIC_TOKEN:-}
      - BLOCKNATIVE_KEY=${BLOCKNATIVE_KEY:-}
      - GITHUB_REPO=${GITHUB_REPO:-}
      - GITHUB_BRANCH=${GITHUB_BRANCH:-main}
      - LANGUAGE=${LANGUAGE:-de}
    volumes:
      - ./backups:/app/backups
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - trevlix_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/update/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── MySQL 8 ───────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: trevlix_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASS:-root_secret}
      MYSQL_DATABASE: trevlix
      MYSQL_USER: trevlix
      MYSQL_PASSWORD: ${MYSQL_PASS:-trevlix_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - trevlix_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "trevlix", "--password=${MYSQL_PASS:-trevlix_pass}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "127.0.0.1:3306:3306"   # Only accessible locally

  # ── Nginx Reverse Proxy (optional – für HTTPS) ─────────────────
  nginx:
    image: nginx:alpine
    container_name: trevlix_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro        # Mount your SSL certs here
    depends_on:
      - trevlix
    networks:
      - trevlix_net
    profiles:
      - production                             # Only starts with: docker compose --profile production up

volumes:
  mysql_data:
    driver: local

networks:
  trevlix_net:
    driver: bridge
