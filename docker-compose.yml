version: "3.9"

# ╔══════════════════════════════════════════════════════════════╗
# ║  TREVLIX v1.1.0 – Docker Compose                            ║
# ║  Start:       docker compose up -d                           ║
# ║  Prod (HTTPS): docker compose --profile production up -d     ║
# ║  Logs:        docker compose logs -f trevlix                 ║
# ╚══════════════════════════════════════════════════════════════╝

services:

  # ── TREVLIX Bot ────────────────────────────────────────────────
  trevlix:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trevlix
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      # Exchange
      - EXCHANGE=${EXCHANGE:-cryptocom}
      - API_KEY=${API_KEY}
      - API_SECRET=${API_SECRET}
      # MySQL (Service-Name als Host)
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=trevlix
      - MYSQL_PASS=${MYSQL_PASS:?MYSQL_PASS muss in .env gesetzt sein}
      - MYSQL_DB=trevlix
      # Security
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD muss in .env gesetzt sein}
      - DASHBOARD_SECRET=${DASHBOARD_SECRET:?DASHBOARD_SECRET muss in .env gesetzt sein}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET muss in .env gesetzt sein}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY muss in .env gesetzt sein}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY muss in .env gesetzt sein}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5000}
      - SESSION_TIMEOUT_MIN=${SESSION_TIMEOUT_MIN:-30}
      # Features
      - PAPER_TRADING=${PAPER_TRADING:-true}
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK:-}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - CRYPTOPANIC_TOKEN=${CRYPTOPANIC_TOKEN:-}
      - CRYPTOPANIC_API_PLAN=${CRYPTOPANIC_API_PLAN:-free}
      - BLOCKNATIVE_KEY=${BLOCKNATIVE_KEY:-}
      - GITHUB_REPO=${GITHUB_REPO:-}
      - GITHUB_BRANCH=${GITHUB_BRANCH:-main}
      - LANGUAGE=${LANGUAGE:-de}
    volumes:
      - ./backups:/app/backups
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - trevlix_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    # Log-Rotation (Verbesserung #19)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── MySQL 8 ───────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: trevlix_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASS:?MYSQL_ROOT_PASS muss in .env gesetzt sein}
      MYSQL_DATABASE: trevlix
      MYSQL_USER: trevlix
      MYSQL_PASSWORD: ${MYSQL_PASS:?MYSQL_PASS muss in .env gesetzt sein}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - trevlix_net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u trevlix -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "127.0.0.1:3306:3306"   # Nur lokal erreichbar
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Nginx Reverse Proxy (optional – nur mit --profile production) ──
  nginx:
    image: nginx:alpine
    container_name: trevlix_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro        # SSL-Zertifikate hier ablegen
    depends_on:
      trevlix:
        condition: service_healthy
    networks:
      - trevlix_net
    profiles:
      - production                             # Nur mit: docker compose --profile production up
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  mysql_data:
    driver: local

networks:
  trevlix_net:
    driver: bridge
